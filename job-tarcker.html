<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="font">
    <header class="bg-base-100 shadow-sm">
        <div class="container w-11/12 mx-auto">
            <div class="navbar">
                <div class="flex-1">
                    <div class="flex items-center gap-1">
                        <img class="w-6 md:w-9" src="assets/github-logo.png" alt="github logo">
                        <p class="text-xs md:text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
                </div>
            </div>
        </div>
    </header>
    <section class="py-15 px-5 md:px-8 bg-[#F8FAFC]">
        <div class="container w-11/12 space-y-5 mx-auto">
            <div class="flex justify-start items-center flex-wrap gap-2 p-6 rounded-s-lg shadow-sm">
                <button id="all" class="btn btn-outline btn-primary active w-[120px]"
                    onclick="clickButton('all')">All</button>
                <button id="open" class="btn btn-outline btn-primary w-[120px]"
                    onclick="clickButton('open')">Open</button>
                <button id="closed" class="btn btn-outline btn-primary w-[120px]"
                    onclick="clickButton('closed')">Closed</button>
            </div>
            <div class="rounded-xl shadow-xl">
                <div class="flex items-center flex-wrap p-6 border-b border-[#E4E4E7] w-full">
                    <div class="flex flex-col md:flex-row gap-5 w-full justify-start md:justify-between ">
                        <div class="flex justify-center items-center gap-2">
                            <div class="p-2 rounded-full bg-[#ECE4FF]">
                                <img src="assets/Aperture.png" alt="icon">
                            </div>
                            <div>
                                <p class="text-xl font-semibold text-[#1F2937]"><span id="job-count">50</span> Issues
                                </p>
                                <p class="text-[16px] text-[#64748B]">Track and manage your project issues</p>
                            </div>
                        </div>
                        <div class="flex justify-start items-center gap-4">
                            <div class="flex justify-center items-center gap-2">
                                <div class="bg-[#00A96E] rounded-full w-3 h-3"></div>
                                <p>Open</p>
                            </div>
                            <div class="flex justify-center items-center gap-2">
                                <div class="bg-[#A855F7] rounded-full w-3 h-3"></div>
                                <p>Closed</p>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- cards container -->
                <div id="cards-container" class="p-5 md:p-6 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                    <!-- cards -->

                </div>
            </div>
        </div>
    </section>

    <!-- Modal -->

    <dialog id="issue_details" class="modal modal-bottom sm:modal-middle">
        <div class="modal-content bg-white rounded-lg p-6 md:p-8">
            <div id="modal-content" class="">
                <div class="flex flex-col justify-start items-start gap-2">
                    <div class="justify-center text-gray-800 text-2xl font-bold ">Fix broken
                        image uploads</div>
                    <div class="inline-flex justify-start items-center gap-2">
                        <div class="h-6 p-2 bg-emerald-600 rounded-[100px] flex justify-center items-center gap-1.5">
                            <div
                                class="text-center justify-center text-white text-xs font-medium  leading-3">
                                Opened</div>
                        </div>
                        <div class="w-1 h-1 bg-slate-500 rounded-full"></div>
                        <div class="justify-center text-slate-500 text-xs">Opened by Fahim
                            Ahmed</div>
                        <div class="w-1 h-1 bg-slate-500 rounded-full"></div>
                        <div class="justify-center text-slate-500 text-xs">22/02/2026</div>
                    </div>
                </div>
            </div>
            <div class="modal-action">
                <form method="dialog">

                    <button class="btn btn-primary">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="custom js/toggle.js"></script>
    <script src="custom js/function.js"></script>
    <script src="custom js/render.js"></script>
</body>

</html>
